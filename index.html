<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TITINA LLC | Game Studio</title>
    <style>
        /* Paleta de colores y variables */
        :root {
            --bg-color: #0f0f13;
            --text-color: #e0e0e0;
            --accent-color: #7b2cbf; /* Morado estilo gaming */
            --accent-glow: #9d4edd;
        }
        
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
        }

        /* Barra de navegación */
        header {
            padding: 20px 50px;
            background: rgba(0,0,0,0.5);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--accent-color);
            box-shadow: 0 0 10px rgba(123, 44, 191, 0.3);
        }

        header h1 {
            margin: 0;
            color: #fff;
            font-size: 1.5rem;
            letter-spacing: 2px;
        }

        /* Sección Principal (Hero) */
        .hero {
            text-align: center;
            padding: 100px 20px;
            background: radial-gradient(circle at center, #1a1a2e 0%, var(--bg-color) 100%);
        }

        .hero h2 {
            font-size: 3rem;
            margin-bottom: 10px;
            color: #fff;
            text-shadow: 0 0 10px var(--accent-glow);
        }

        .hero p {
            font-size: 1.2rem;
            color: #aaa;
            max-width: 600px;
            margin: 0 auto 30px auto;
            line-height: 1.6;
        }

            color: white;
            padding: 12px 24px;
            text-decoration: none;
            border-radius: 5px;
